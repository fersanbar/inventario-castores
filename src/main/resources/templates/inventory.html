<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
</head>
<body>

<h1>Sistema de Inventario</h1>

<p>
    Usuario:
    <span th:text="${usuario.nombre}"></span>
    -
    Rol:
    <span th:text="${usuario.role.nombre}"></span>
</p>

<a href="/inventario">Inventario</a>

<span th:if="${usuario.role.nombre == 'Almacenista'}">
    | <a href="/salida">Salida de Productos</a>
</span>

<span th:if="${usuario.role.nombre == 'Administrador'}">
    | <a href="/historial">Historial</a>
</span>

| <a href="/logout">Cerrar sesión</a>

<hr>

<div th:if="${error}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<div th:if="${success}">
    <p style="color:green;" th:text="${success}"></p>
</div>

<div th:if="${usuario.role.nombre == 'Administrador'}">

    <h2>Agregar Producto</h2>

    <form th:action="@{/inventario/agregar}" method="post">

        <label>Nombre</label><br>
        <input type="text" name="nombre" required>

        <br><br>

        <label>Descripción</label><br>
        <input type="text" name="descripcion">

        <br><br>

        <button type="submit">
            Guardar Producto
        </button>

    </form>

    <hr>

</div>

<h2>Inventario</h2>

<div th:if="${#lists.isEmpty(productos)}">
    <p>No hay productos registrados.</p>
</div>

<table border="1" cellpadding="10" th:if="${!#lists.isEmpty(productos)}">

    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Existencia</th>
        <th>Activo</th>

        <th th:if="${usuario.role.nombre == 'Administrador'}">
            Agregar Inventario
        </th>

        <th th:if="${usuario.role.nombre == 'Administrador'}">
            Estatus
        </th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="producto : ${productos}">

        <td th:text="${producto.id}"></td>

        <td th:text="${producto.nombre}"></td>

        <td th:text="${producto.descripcion}"></td>

        <td th:text="${producto.existencia}"></td>

        <td th:text="${producto.activo ? 'Activo' : 'Inactivo'}"></td>

        <td th:if="${usuario.role.nombre == 'Administrador'}">
            <form th:action="@{/inventario/entrada/{id}(id=${producto.id})}" method="post">
                <input type="number" name="cantidad" min="1" required>
                <button type="submit">Agregar</button>
            </form>
        </td>

        <td th:if="${usuario.role.nombre == 'Administrador'}">

            <a th:href="@{/inventario/status/{id}(id=${producto.id})}">

                <span th:if="${producto.activo}">
                    Dar de baja
                </span>

                <span th:unless="${producto.activo}">
                    Reactivar
                </span>

            </a>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
